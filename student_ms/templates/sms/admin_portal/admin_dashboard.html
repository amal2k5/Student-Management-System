{% extends "base.html" %}
{% load static %}
{% block content %}

<style>
    .dashboard-title {
        font-weight: 800;
        letter-spacing: 0.5px;
    }
</style>

<h2 class="text-center text-primary mb-4 dashboard-title">
    Welcome, Admin {{ request.user.username }} 
</h2>


<div class="mb-5">
    <div id="adminCarousel"
         class="carousel carousel-dark slide shadow rounded overflow-hidden"
         data-bs-ride="carousel">

        <div class="carousel-indicators">
            <button type="button" data-bs-target="#adminCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#adminCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#adminCarousel" data-bs-slide-to="2"></button>
        </div>

        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="{% static 'images/class1.jpg' %}" class="d-block w-100" style="height:380px;object-fit:cover;">
            </div>
            <div class="carousel-item">
                <img src="{% static 'images/class2.jpg' %}" class="d-block w-100" style="height:380px;object-fit:cover;">
            </div>
            <div class="carousel-item">
                <img src="{% static 'images/class3.jpg' %}" class="d-block w-100" style="height:380px;object-fit:cover;">
            </div>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#adminCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#adminCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
</div>

<!-- STATS -->
<div class="row g-4">

    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 text-center p-4">
            <i class="bi bi-people fs-1 text-primary mb-2"></i>
            <p class="text-uppercase small text-muted mb-1">Total Students</p>
            <h2 class="fw-bold text-primary">{{ students.count }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 text-center p-4">
            <i class="bi bi-layout-text-window fs-1 text-success mb-2"></i>
            <p class="text-uppercase small text-muted mb-1">Panel</p>
            <h5 class="fw-bold text-success">Student Management</h5>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 text-center p-4">
            <i class="bi bi-person-badge fs-1 text-warning mb-2"></i>
            <p class="text-uppercase small text-muted mb-1">Admin</p>
            <h5 class="fw-bold text-warning">{{ request.user.username }}</h5>
        </div>
    </div>

</div>

{% endblock %}
